<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ContentThai AI — Prompt Toolkit Full</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ══ DESIGN TOKENS ══ */
:root {
  --bg:      #f0f4f8;
  --surface: #ffffff;
  --s2:      #f7f9fc;
  --s3:      #edf1f7;
  --border:  #dde3ee;
  --primary: #2563eb;
  --primary-light: #eff6ff;
  --accent:  #f59e0b;
  --green:   #16a34a;
  --red:     #dc2626;
  --purple:  #7c3aed;
  --text:    #1e293b;
  --text2:   #475569;
  --muted:   #94a3b8;
  --font:    'Sarabun', sans-serif;
  --head:    'Outfit', sans-serif;
  --radius:  12px;
  --shadow:  0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
}

/* ══ RESET ══ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; -webkit-text-size-adjust:100%; }
body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:15px; line-height:1.7; min-height:100vh; }
button { cursor:pointer; font-family:var(--font); }
input, textarea { font-family:var(--font); }

/* ══ TOPBAR ══ */
.topbar {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:100;
  box-shadow:var(--shadow);
}
.brand { font-family:var(--head); font-weight:800; font-size:18px; white-space:nowrap; }
.brand span { color:var(--accent); }
.brand-badge {
  font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px;
  background:linear-gradient(135deg,#7c3aed,#2563eb);
  color:white; font-family:monospace; letter-spacing:.5px; margin-left:4px;
}

/* Search */
.search-wrap { position:relative; flex:1; max-width:360px; }
.search-wrap input {
  width:100%; background:var(--s2); border:1.5px solid var(--border);
  border-radius:10px; padding:9px 14px 9px 38px;
  color:var(--text); font-size:14px; outline:none; transition:.2s;
}
.search-wrap input:focus { border-color:var(--primary); background:var(--surface); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.search-wrap input::placeholder { color:var(--muted); }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); }

/* Top Actions */
.top-actions { display:flex; align-items:center; gap:8px; margin-left:auto; }
.btn-claude {
  display:flex; align-items:center; gap:6px;
  background:linear-gradient(135deg,#f59e0b,#ef4444);
  color:white; border:none; border-radius:10px;
  padding:8px 16px; font-size:13px; font-weight:700;
  text-decoration:none; transition:.2s; white-space:nowrap;
}
.btn-claude:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(245,158,11,.3); }
.top-count { font-size:12px; color:var(--muted); white-space:nowrap; }

/* ══ MOBILE NAV ══ */
.mobile-nav {
  display:none;
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:8px 16px; gap:6px; overflow-x:auto;
}
.mobile-cat-btn {
  background:var(--s2); border:1.5px solid var(--border); border-radius:20px;
  padding:6px 14px; font-size:12px; font-weight:600; color:var(--text2);
  white-space:nowrap; transition:.15s;
}
.mobile-cat-btn.active { background:var(--primary); border-color:var(--primary); color:white; }

/* ══ LAYOUT ══ */
.layout { display:flex; height:calc(100vh - 57px); }

/* Sidebar */
.sidebar {
  width:220px; background:var(--surface); border-right:1px solid var(--border);
  overflow-y:auto; flex-shrink:0; padding:12px 8px;
}
.sidebar-section { font-size:10px; font-weight:700; color:var(--muted); letter-spacing:2px; text-transform:uppercase; padding:8px 10px 4px; }
.cat-btn {
  width:100%; text-align:left; background:none; border:none;
  border-radius:10px; padding:10px 12px; color:var(--text2);
  font-size:13px; font-weight:600; transition:.15s; display:flex; align-items:center; justify-content:space-between;
}
.cat-btn:hover { background:var(--s2); color:var(--text); }
.cat-btn.active { background:var(--primary-light); color:var(--primary); }
.cat-count { background:var(--s3); border-radius:10px; padding:1px 7px; font-size:10px; font-weight:700; color:var(--muted); }
.cat-btn.active .cat-count { background:rgba(37,99,235,.1); color:var(--primary); }

/* Template List */
.list {
  width:240px; background:var(--s2); border-right:1px solid var(--border);
  overflow-y:auto; flex-shrink:0;
}
.list-item {
  display:block; width:100%; text-align:left; background:none; border:none;
  border-bottom:1px solid var(--border); padding:14px 16px;
  color:var(--text2); transition:.15s; position:relative;
}
.list-item:hover { background:var(--surface); }
.list-item.active { background:var(--surface); border-left:3px solid var(--primary); }
.item-name { font-size:13px; font-weight:700; color:var(--text); line-height:1.4; margin-bottom:3px; }
.item-use { font-size:11px; color:var(--muted); line-height:1.5; }
.item-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
.item-tag { font-size:10px; padding:2px 7px; border-radius:5px; font-weight:600; }
.fav-btn {
  position:absolute; top:12px; right:12px;
  background:none; border:none; font-size:16px; color:var(--muted);
  transition:.15s; padding:2px;
}
.fav-btn:hover { transform:scale(1.2); }
.fav-btn.active { color:var(--accent); }

/* Detail Pane */
.detail { flex:1; overflow-y:auto; padding:24px; background:var(--bg); }

/* Empty State */
.detail-empty {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; color:var(--muted); text-align:center; gap:14px;
}
.empty-icon { font-size:64px; opacity:.4; }

/* Detail Header */
.detail-cat { font-size:11px; color:var(--primary); font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
.detail-name { font-family:var(--head); font-size:22px; font-weight:800; color:var(--text); margin-bottom:10px; }
.detail-use {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--primary-light); border:1px solid rgba(37,99,235,.2);
  border-radius:20px; padding:5px 14px; font-size:13px; color:var(--primary); font-weight:600;
}
.detail-actions { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
.btn-action {
  display:flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius:10px; font-size:13px; font-weight:700; border:none; transition:.2s;
}
.btn-copy { background:var(--primary); color:white; }
.btn-copy:hover { background:#1d4ed8; transform:translateY(-1px); }
.btn-copy.copied { background:var(--green); }
.btn-fav { background:var(--s3); color:var(--text2); border:1.5px solid var(--border); }
.btn-fav:hover { border-color:var(--accent); color:var(--accent); }
.btn-fav.active { background:#fef3c7; border-color:var(--accent); color:var(--accent); }
.btn-open-claude {
  background:linear-gradient(135deg,#f59e0b,#ef4444);
  color:white; text-decoration:none;
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 16px; border-radius:10px; font-size:13px; font-weight:700;
}

/* Warn Box */
.warn-box {
  background:#fff7ed; border:1.5px solid #fed7aa;
  border-radius:10px; padding:12px 16px; font-size:13px; color:#9a3412;
  margin-bottom:16px; display:flex; gap:10px; align-items:flex-start;
}

/* Prompt Box */
.prompt-card {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:var(--radius); overflow:hidden; margin-bottom:16px;
  box-shadow:var(--shadow);
}
.prompt-card-header {
  background:#1e293b; padding:12px 18px;
  display:flex; align-items:center; justify-content:space-between;
}
.prompt-dots { display:flex; gap:6px; }
.prompt-dots span { width:10px; height:10px; border-radius:50%; }
.prompt-label { font-size:11px; color:#64748b; font-family:monospace; }
.prompt-body {
  padding:20px; font-size:14px; line-height:2; color:#334155;
  white-space:pre-wrap; word-break:break-word;
  max-height:400px; overflow-y:auto; background:#f8fafc;
}
.prompt-body .bracket { color:var(--primary); font-weight:700; background:rgba(37,99,235,.08); border-radius:3px; padding:0 2px; }

/* Generate Box */
.generate-card {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:var(--radius); padding:20px; margin-bottom:16px;
  box-shadow:var(--shadow);
}
.generate-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.gen-fields { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
@media(max-width:600px){ .gen-fields { grid-template-columns:1fr; } }
.gen-field label { display:block; font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; margin-bottom:5px; }
.gen-field input, .gen-field select {
  width:100%; background:var(--s2); border:1.5px solid var(--border);
  border-radius:8px; padding:8px 12px; font-size:13px; color:var(--text); outline:none; transition:.15s;
}
.gen-field input:focus, .gen-field select:focus { border-color:var(--primary); }
.btn-generate {
  width:100%; padding:11px; background:linear-gradient(135deg,var(--primary),#7c3aed);
  color:white; border:none; border-radius:10px; font-size:14px; font-weight:700; transition:.2s;
}
.btn-generate:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(37,99,235,.3); }
.btn-generate:disabled { opacity:.6; transform:none; cursor:not-allowed; }
.gen-result {
  background:#f0f9ff; border:1.5px solid #bae6fd;
  border-radius:10px; padding:16px; font-size:13px; line-height:1.9;
  color:var(--text); white-space:pre-wrap; display:none; margin-top:12px;
}
.gen-result.show { display:block; }

/* How-to Box */
.how-card {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:var(--radius); padding:18px; margin-bottom:12px;
  box-shadow:var(--shadow);
}
.how-title { font-size:12px; font-weight:700; color:var(--primary); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
.how-steps { list-style:none; }
.how-steps li { display:flex; gap:12px; align-items:flex-start; margin-bottom:10px; font-size:13px; color:var(--text2); }
.how-steps li::before {
  content:counter(step); counter-increment:step;
  min-width:22px; height:22px; border-radius:50%; background:var(--primary);
  color:white; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; flex-shrink:0; margin-top:1px;
}
.how-steps { counter-reset:step; }

/* Tip */
.tip-card { background:#fefce8; border:1.5px solid #fde68a; border-radius:10px; padding:12px 16px; font-size:13px; color:#713f12; }

/* Fav Page */
.fav-empty { text-align:center; padding:60px 20px; color:var(--muted); }

/* Loading spinner */
.spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:white; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--muted); }

/* ══ MOBILE ══ */
@media(max-width:768px){
  .sidebar { display:none; }
  .mobile-nav { display:flex; }
  .list { width:100%; border-right:none; border-bottom:1px solid var(--border); max-height:220px; }
  .layout { flex-direction:column; height:auto; overflow:visible; }
  .detail { padding:16px; }
  .topbar { padding:10px 14px; gap:8px; }
  .brand-badge, .top-count { display:none; }
  .btn-claude { padding:8px 12px; font-size:12px; }
  .detail-name { font-size:18px; }
}
@media(max-width:480px){
  .top-actions { flex-shrink:0; }
  .search-wrap { display:none; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">ContentThai <span>AI</span><span class="brand-badge">FULL</span></div>
  <div class="search-wrap">

function allItems() {
  return DATA.flatMap((c, ci) => c.items.map((it, ii) => ({ ...it, ci, ii, cat: c.cat, accent: c.accent })));
}
function totalTemplates() { return DATA.reduce((s, c) => s + c.items.length, 0); }
function isFav(ci, ii) { return favorites.some(f => f.ci === ci && f.ii === ii); }
function toggleFav(ci, ii) {
  if (isFav(ci, ii)) {
    favorites = favorites.filter(f => !(f.ci === ci && f.ii === ii));
  } else {
    favorites.push({ ci, ii });
  }
  localStorage.setItem('ct_favs', JSON.stringify(favorites));
  renderAll();
}
function sanitize(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function highlightBrackets(text) {
  return sanitize(text).replace(/\[([^\]]+)\]/g, '<span class="bracket">[$1]</span>');
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function renderAll() {
  updateCount();
  renderSidebar();
  renderMobileNav();
  renderList();
  renderDetail();
  renderFavBadge();
}

function updateCount() {
  const el = document.getElementById('totalCount');
  if (!el) return;
  const q = searchQ.toLowerCase();
  const visible = q ? allItems().filter(it => it.name.toLowerCase().includes(q) || it.use.toLowerCase().includes(q)).length : totalTemplates();
  el.textContent = q ? `พบ ${visible} / ${totalTemplates()} templates` : `${totalTemplates()} templates`;
}

function renderFavBadge() {
  const el = document.getElementById('fav-count-badge');
  if (el) el.textContent = favorites.length > 0 ? `(${favorites.length})` : '';
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  if (!sb) return;
  sb.innerHTML = `<div class="sidebar-section">หมวดหมู่</div>` +
    DATA.map((c, ci) => `
      <button class="cat-btn ${!showFav && activeCat === ci && !searchQ ? 'active' : ''}"
        onclick="setCat(${ci})" style="${!showFav && activeCat === ci && !searchQ ? `border-left:3px solid ${c.accent}` : ''}">
        <span>${c.cat}</span>
        <span class="cat-count">${c.items.length}</span>
      </button>`).join('') +
    `<div style="margin-top:8px;padding:4px 8px"><button class="cat-btn ${showFav ? 'active' : ''}" onclick="showFavorites()" style="${showFav ? 'border-left:3px solid #f59e0b' : ''}">
      <span>⭐ Favorites</span>
      <span class="cat-count">${favorites.length}</span>
    </button></div>`;
}

function renderMobileNav() {
  const mn = document.getElementById('mobileNav');
  if (!mn) return;
  mn.innerHTML = DATA.map((c, ci) =>
    `<button class="mobile-cat-btn ${!showFav && activeCat === ci && !searchQ ? 'active' : ''}" onclick="setCat(${ci})">${c.cat}</button>`
  ).join('') + `<button class="mobile-cat-btn ${showFav ? 'active' : ''}" onclick="showFavorites()">⭐ Fav</button>`;
}

function renderList() {
  const lp = document.getElementById('listPane');
  if (!lp) return;
  let items;
  if (showFav) {
    items = favorites.map(f => ({ ...DATA[f.ci].items[f.ii], ci: f.ci, ii: f.ii, cat: DATA[f.ci].cat, accent: DATA[f.ci].accent }));
  } else if (searchQ) {
    const q = searchQ.toLowerCase();
    items = allItems().filter(it => it.name.toLowerCase().includes(q) || it.use.toLowerCase().includes(q));
  } else {
    items = DATA[activeCat]?.items.map((it, ii) => ({ ...it, ci: activeCat, ii, cat: DATA[activeCat].cat, accent: DATA[activeCat].accent })) || [];
  }
  if (!items.length) {
    lp.innerHTML = `<div style="padding:32px 16px;text-align:center;color:var(--muted);font-size:13px">${showFav ? '⭐ ยังไม่มี Favorites<br>กด ⭐ ที่ template ที่ชอบ' : 'ไม่พบ template'}</div>`;
    return;
  }
  const acc = showFav ? '#f59e0b' : (searchQ ? 'var(--primary)' : DATA[activeCat]?.accent || 'var(--primary)');
  lp.innerHTML = items.map(it => {
    const fav = isFav(it.ci, it.ii);
    const active = !showFav && !searchQ && activeItem === it.ii && activeCat === it.ci;
    const tagHtml = (it.tags || []).map(t => `<span class="item-tag" style="background:${it.accent}18;color:${it.accent}">${t}</span>`).join('');
    return `<button class="list-item ${active ? 'active' : ''}" onclick="setItem(${it.ci},${it.ii})" style="${active ? `border-left:3px solid ${it.accent}` : ''}">
      <div class="item-name">${sanitize(it.name)}</div>
      <div class="item-use">${sanitize(it.use)}</div>
      <div class="item-tags">${tagHtml}</div>
      <button class="fav-btn ${fav ? 'active' : ''}" onclick="event.stopPropagation();toggleFav(${it.ci},${it.ii})" title="${fav ? 'ลบจาก Favorites' : 'เพิ่ม Favorites'}">${fav ? '⭐' : '☆'}</button>
    </button>`;
  }).join('');
}

function renderDetail() {
  const dv = document.getElementById('detail');
  if (!dv) return;
  const cat = DATA[activeCat];
  const item = (!searchQ && !showFav && activeItem !== null) ? cat?.items[activeItem] : null;
  const ci = activeCat, ii = activeItem;

  if (!item) {
    dv.innerHTML = `<div class="detail-empty">
      <div class="empty-icon">✨</div>
      <div style="font-size:17px;font-weight:700;color:var(--text)">${showFav && !favorites.length ? 'ยังไม่มี Favorites' : 'เลือก Template ที่ต้องการ'}</div>
      <div style="font-size:14px;color:var(--muted)">${showFav && !favorites.length ? 'กด ☆ ที่ template เพื่อเพิ่ม' : `มีทั้งหมด ${totalTemplates()} templates`}</div>
    </div>`;
    return;
  }

  const fav = isFav(ci, ii);
  const warnHtml = item.warn ? `<div class="warn-box">⚠️ <span>${sanitize(item.warn)}</span></div>` : '';
  const highlighted = highlightBrackets(item.prompt);

  // Generate fields
  const genFieldsHtml = (item.genFields || []).map((f, i) => `
    <div class="gen-field">
      <label>${sanitize(f)}</label>
      <input id="gf_${i}" placeholder="ใส่ข้อมูล..." oninput="updateGenPrompt()">
    </div>`).join('');

  dv.innerHTML = `
    <div style="max-width:720px">
      <div class="detail-cat">${sanitize(cat.cat)}</div>
      <div class="detail-name">${sanitize(item.name)}</div>
      <div class="detail-use">✓ ${sanitize(item.use)}</div>
      <div class="detail-actions">
        <button class="btn-action btn-copy" id="copyBtn" onclick="copyPrompt()">📋 Copy Prompt</button>
        <button class="btn-action btn-fav ${fav ? 'active' : ''}" onclick="toggleFav(${ci},${ii})">
          ${fav ? '⭐ Saved' : '☆ Favorite'}
        </button>
        <a class="btn-open-claude" href="https://claude.ai" target="_blank">🤖 เปิด Claude AI</a>
      </div>

      ${warnHtml}

      <!-- GENERATE FORM -->
      <div class="generate-card" style="margin-top:20px">
        <div class="generate-title">⚡ Generate Prompt — ใส่ข้อมูลแล้วสร้าง Prompt ได้เลย</div>
        <div class="gen-fields">${genFieldsHtml}</div>
        <button class="btn-generate" onclick="generatePrompt(${ci},${ii})">✨ สร้าง Prompt พร้อมข้อมูลของคุณ</button>
        <div class="gen-result" id="genResult">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <strong style="font-size:13px;color:var(--primary)">✅ Prompt พร้อมใช้งาน</strong>
            <button class="btn-action btn-copy" style="padding:6px 12px;font-size:12px" onclick="copyGenResult()">📋 Copy</button>
          </div>
          <div id="genResultText"></div>
        </div>
      </div>

      <!-- PROMPT BOX -->
      <div class="prompt-card" style="margin-top:16px">
        <div class="prompt-card-header">
          <div class="prompt-dots">
            <span style="background:#ff5f56"></span>
            <span style="background:#ffbd2e"></span>
            <span style="background:#27c93f"></span>
          </div>
          <span class="prompt-label">template prompt (ต้นฉบับ)</span>
          <button class="btn-action btn-copy" id="copyBtn2" style="padding:5px 12px;font-size:12px" onclick="copyPrompt()">📋 Copy</button>
        </div>
        <div class="prompt-body">${highlighted}</div>
      </div>

      <!-- HOW TO -->
      <div class="how-card">
        <div class="how-title">วิธีใช้ Template นี้</div>
        <ol class="how-steps">
          <li>กด <strong>Copy Prompt</strong> หรือใช้ Generate ด้านบน</li>
          <li>เปิด <strong>Claude AI</strong> (ปุ่มสีส้มด้านบน) แล้ว Paste</li>
          <li>แทนที่ข้อความ <strong style="color:var(--primary)">[วงเล็บสีน้ำเงิน]</strong> ด้วยข้อมูลจริง</li>
          <li>กด Enter รอผลลัพธ์ประมาณ 10-30 วินาที</li>
          <li>อ่านทบทวน ปรับแก้เล็กน้อย แล้วส่งให้ลูกค้าได้เลย</li>
        </ol>
      </div>

      <div class="tip-card">
        💡 <strong>เคล็ดลับ:</strong> ยิ่งใส่ข้อมูลใน Generate ละเอียดมากเท่าไหร่ Prompt ที่ได้จะยิ่งตรงกับธุรกิจของลูกค้ามากขึ้น ลองใส่ชื่อร้านจริง ราคาจริง และกลุ่มลูกค้าจริง
      </div>
    </div>`;
}

// ══════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════
function setCat(ci) {
  activeCat = ci; activeItem = null; searchQ = ''; showFav = false;
  const si = document.getElementById('searchInput');
  if (si) si.value = '';
  renderAll();
}

function setItem(ci, ii) {
  activeCat = ci; activeItem = ii; searchQ = ''; showFav = false;
  const si = document.getElementById('searchInput');
  if (si) si.value = '';
  renderAll();
  // Scroll to top on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('detail')?.scrollIntoView({ behavior: 'smooth' });
  }
}

function doSearch(v) {
  searchQ = v; activeItem = null; showFav = false;
  renderAll();
}

function showFavorites() {
  showFav = true; activeItem = null; searchQ = '';
  const si = document.getElementById('searchInput');
  if (si) si.value = '';
  renderAll();
}

function copyPrompt() {
  const cat = DATA[activeCat];
  const item = cat?.items[activeItem];
  if (!item) return;
  doCopy(item.prompt, ['copyBtn', 'copyBtn2']);
}

function copyGenResult() {
  const el = document.getElementById('genResultText');
  if (el) doCopy(el.textContent, ['copyGenBtn']);
}

function doCopy(text, btnIds) {
  const copy = () => {
    btnIds.forEach(id => {
      const btn = document.getElementById(id);
      if (btn) { btn.textContent = '✓ Copied!'; btn.classList.add('copied'); setTimeout(() => { if (btn) { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); } }, 2000); }
    });
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(copy).catch(() => fallbackCopy(text, copy));
  } else {
    fallbackCopy(text, copy);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy');
  document.body.removeChild(ta); if (cb) cb();
}

// ══════════════════════════════════════
// GENERATE PROMPT
// ══════════════════════════════════════
function updateGenPrompt() { /* live update placeholder */ }

function generatePrompt(ci, ii) {
  const item = DATA[ci]?.items[ii];
  if (!item) return;
  const fields = item.genFields || [];
  let prompt = item.prompt;

  // Replace each [bracket] with user input
  const fieldPatterns = prompt.match(/\[([^\]]+)\]/g) || [];
  fieldPatterns.forEach((bracket, i) => {
    const inputEl = document.getElementById(`gf_${i}`);
    const val = inputEl?.value?.trim();
    if (val) {
      prompt = prompt.replace(bracket, val);
    }
  });

  const resultEl = document.getElementById('genResult');
  const resultText = document.getElementById('genResultText');
  if (resultEl && resultText) {
    resultText.textContent = prompt;
    resultEl.classList.add('show');
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ══════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === '/' && !e.target.matches('input,textarea')) {
    e.preventDefault();
    document.getElementById('searchInput')?.focus();
  }
  if (e.key === 'Escape') {
    doSearch('');
    document.getElementById('searchInput').value = '';
  }
});

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
renderAll();
</script>

</html>
